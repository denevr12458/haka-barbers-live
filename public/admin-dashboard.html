<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Haka Barbers</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0a0908; color: #ede0cc; }
    .header { background: #1c1510; padding: 20px; border-bottom: 1px solid #3a2e22; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 24px; letter-spacing: .3em; color: #c9a96e; text-transform: uppercase; }
    .logout-btn { background: #c9a96e; color: #080706; padding: 8px 16px; text-decoration: none; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; }
    .logout-btn:hover { background: #b8995e; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .tabs { display: flex; margin-bottom: 40px; border-bottom: 1px solid #3a2e22; }
    .tab { padding: 12px 24px; cursor: pointer; background: none; border: none; color: #7a6858; font-family: inherit; font-size: 14px; letter-spacing: .1em; text-transform: uppercase; }
    .tab.active { color: #c9a96e; border-bottom: 2px solid #c9a96e; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .stats { display: flex; gap: 20px; margin-bottom: 40px; }
    .stat-card { background: #1c1510; padding: 20px; border: 1px solid #3a2e22; flex: 1; text-align: center; }
    .stat-num { font-size: 32px; color: #c9a96e; }
    .stat-label { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: #7a6858; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #3a2e22; }
    th { background: #1c1510; color: #c9a96e; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; }
    td { background: #0a0908; }
    .btn { background: #c9a96e; color: #080706; padding: 8px 16px; text-decoration: none; font-family: inherit; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; border: none; cursor: pointer; }
    .btn:hover { background: #b8995e; }
    .btn-danger { background: #ff8080; color: #080706; }
    .btn-danger:hover { background: #e67373; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: #7a6858; }
    .form-control { width: 100%; padding: 10px; background: #1c1510; border: 1px solid #3a2e22; color: #ede0cc; font-family: inherit; }
    .form-control:focus { outline: none; border-color: #c9a96e; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
    .modal-content { background: #1c1510; margin: 10% auto; padding: 20px; border: 1px solid #3a2e22; width: 90%; max-width: 500px; }
    .modal-header { margin-bottom: 20px; }
    .modal-title { font-size: 18px; color: #c9a96e; }
    .close { float: right; font-size: 28px; cursor: pointer; }
    .alert { padding: 12px; margin-bottom: 20px; background: #3a2e22; color: #ff8080; border-left: 4px solid #ff8080; display: none; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #080706; border-radius: 50%; border-top-color: #c9a96e; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="logo">HAKA</div>
      <a href="/admin/logout" class="logout-btn">Logout</a>
    </div>
  </div>

  <div class="container">
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-num" id="total-bookings">0</div>
        <div class="stat-label">Total Bookings</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="bookings">Bookings</button>
      <button class="tab" data-tab="services">Services</button>
      <button class="tab" data-tab="blocks">Blocked Slots</button>
    </div>

    <div id="bookings" class="tab-content active">
      <h2>Bookings</h2>
      <table id="bookings-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Customer</th>
            <th>Service</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="services" class="tab-content">
      <h2>Services</h2>
      <button class="btn" id="add-service-btn">Add Service</button>
      <table id="services-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Duration</th>
            <th>Price</th>
            <th>Active</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="blocks" class="tab-content">
      <h2>Blocked Slots</h2>
      <button class="btn" id="add-block-btn">Add Block</button>
      <table id="blocks-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
            <th>Reason</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Modals -->
  <div id="service-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="service-modal-title">Add Service</span>
        <span class="close" data-modal="service-modal">&times;</span>
      </div>
      <div id="service-alert" class="alert"></div>
      <form id="service-form">
        <input type="hidden" id="service-id">
        <div class="form-group">
          <label class="form-label" for="service-name">Name</label>
          <input type="text" id="service-name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="service-description">Description</label>
          <textarea id="service-description" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="service-duration">Duration (min)</label>
          <input type="number" id="service-duration" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="service-price">Price (£)</label>
          <input type="number" step="0.01" id="service-price" class="form-control" required>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="service-active" checked> Active</label>
        </div>
        <button type="submit" id="service-submit-btn" class="btn">Save</button>
      </form>
    </div>
  </div>

  <div id="block-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Add Blocked Slot</span>
        <span class="close" data-modal="block-modal">&times;</span>
      </div>
      <div id="block-alert" class="alert"></div>
      <form id="block-form">
        <div class="form-group">
          <label class="form-label" for="block-date">Date</label>
          <input type="date" id="block-date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="block-start">Start Time</label>
          <input type="time" id="block-start" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="block-end">End Time</label>
          <input type="time" id="block-end" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="block-reason">Reason</label>
          <input type="text" id="block-reason" class="form-control">
        </div>
        <button type="submit" id="block-submit-btn" class="btn">Save</button>
      </form>
    </div>
  </div>

  <script>
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    // Load data
    function loadStats() {
      fetch('/admin/api/stats')
        .then(r => r.json())
        .then(data => {
          document.getElementById('total-bookings').textContent = data.totalBookings;
        });
    }

    function loadBookings() {
      fetch('/admin/api/bookings')
        .then(r => r.json())
        .then(data => {
          const tbody = document.querySelector('#bookings-table tbody');
          tbody.innerHTML = data.map(b => `
            <tr>
              <td>${b.booking_date}</td>
              <td>${b.start_time}</td>
              <td>${b.customer_name}<br><small>${b.customer_email}</small></td>
              <td>${b.service_name}</td>
              <td>${b.status}</td>
              <td>
                <select onchange="updateStatus('${b.id}', this.value)">
                  <option value="confirmed" ${b.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                  <option value="cancelled" ${b.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                  <option value="completed" ${b.status === 'completed' ? 'selected' : ''}>Completed</option>
                </select>
              </td>
            </tr>
          `).join('');
        });
    }

    function loadServices() {
      fetch('/admin/api/services')
        .then(r => r.json())
        .then(data => {
          const tbody = document.querySelector('#services-table tbody');
          tbody.innerHTML = data.map(s => `
            <tr>
              <td>${s.name}</td>
              <td>${s.description}</td>
              <td>${s.duration} min</td>
              <td>£${s.price}</td>
              <td>${s.active ? 'Yes' : 'No'}</td>
              <td>
                <button class="btn" onclick="editService(${s.id})">Edit</button>
                <button class="btn btn-danger" onclick="deleteService(${s.id})">Delete</button>
              </td>
            </tr>
          `).join('');
        });
    }

    function loadBlocks() {
      fetch('/admin/api/blocks')
        .then(r => r.json())
        .then(data => {
          const tbody = document.querySelector('#blocks-table tbody');
          tbody.innerHTML = data.map(b => `
            <tr>
              <td>${b.block_date}</td>
              <td>${b.start_time}</td>
              <td>${b.end_time}</td>
              <td>${b.reason || ''}</td>
              <td><button class="btn btn-danger" onclick="deleteBlock(${b.id})">Delete</button></td>
            </tr>
          `).join('');
        });
    }

    function updateStatus(id, status) {
      fetch(`/admin/api/bookings/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
    }

    function editService(id) {
      fetch('/admin/api/services')
        .then(r => r.json())
        .then(data => {
          const s = data.find(x => x.id == id);
          if (s) {
            document.getElementById('service-id').value = s.id;
            document.getElementById('service-name').value = s.name;
            document.getElementById('service-description').value = s.description;
            document.getElementById('service-duration').value = s.duration;
            document.getElementById('service-price').value = s.price;
            document.getElementById('service-active').checked = s.active;
            document.getElementById('service-modal-title').textContent = 'Edit Service';
            document.getElementById('service-modal').style.display = 'block';
          }
        });
    }

    function deleteService(id) {
      if (confirm('Delete this service?')) {
        fetch(`/admin/api/services/${id}`, { method: 'DELETE' })
          .then(() => loadServices());
      }
    }

    function deleteBlock(id) {
      if (confirm('Delete this block?')) {
        fetch(`/admin/api/blocks/${id}`, { method: 'DELETE' })
          .then(() => loadBlocks());
      }
    }

    // Modals
    document.getElementById('add-service-btn').addEventListener('click', () => {
      document.getElementById('service-form').reset();
      document.getElementById('service-id').value = '';
      document.getElementById('service-modal-title').textContent = 'Add Service';
      document.getElementById('service-modal').style.display = 'block';
    });

    document.getElementById('add-block-btn').addEventListener('click', () => {
      document.getElementById('block-form').reset();
      document.getElementById('block-modal').style.display = 'block';
    });

    document.querySelectorAll('.close').forEach(close => {
      close.addEventListener('click', () => {
        document.getElementById(close.dataset.modal).style.display = 'none';
      });
    });

    // Forms
    document.getElementById('service-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('service-submit-btn');
      const alert = document.getElementById('service-alert');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';
      alert.style.display = 'none';

      const data = {
        name: document.getElementById('service-name').value,
        description: document.getElementById('service-description').value,
        duration: +document.getElementById('service-duration').value,
        price: +document.getElementById('service-price').value,
        active: document.getElementById('service-active').checked
      };

      const id = document.getElementById('service-id').value;
      const method = id ? 'PUT' : 'POST';
      const url = id ? `/admin/api/services/${id}` : '/admin/api/services';

      fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          document.getElementById('service-modal').style.display = 'none';
          loadServices();
        } else {
          alert.textContent = res.error || 'Save failed';
          alert.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Save';
      });
    });

    document.getElementById('block-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('block-submit-btn');
      const alert = document.getElementById('block-alert');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';
      alert.style.display = 'none';

      fetch('/admin/api/blocks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          block_date: document.getElementById('block-date').value,
          start_time: document.getElementById('block-start').value,
          end_time: document.getElementById('block-end').value,
          reason: document.getElementById('block-reason').value
        })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          document.getElementById('block-modal').style.display = 'none';
          loadBlocks();
        } else {
          alert.textContent = res.error || 'Save failed';
          alert.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Save';
      });
    });

    // Load initial data
    loadStats();
    loadBookings();
    loadServices();
    loadBlocks();
  </script>
</body>
</html>
